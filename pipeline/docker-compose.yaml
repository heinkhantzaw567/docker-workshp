services:
  postgres:
    image: postgres:18
    container_name: my_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: hi
    volumes:
      - hi_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - pg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d hi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "8080:80"
    networks:
      - pg-network
    depends_on:
      - postgres
    restart: unless-stopped

  taxi_ingest:
    build:
      context: .
      dockerfile: Dockerfile
    image: taxi_ingest:v0001
    container_name: taxi_ingest
    networks:
      - pg-network
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--pg_host=my_postgres"
      - "--pg_user=root"
      - "--pg_password=root"
      - "--pg_db=hi"
      - "--pg_port=5432"
      - "--year=2021"
      - "--month=1"
      - "--table_name=yellow_taxi_data"
      - "--chunksize=100000"

volumes:
  hi_postgres_data:

networks:
  pg-network:
    external: true
    name: pg-network
